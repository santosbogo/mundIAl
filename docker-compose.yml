services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mundial
      POSTGRES_PASSWORD: mundial
      POSTGRES_DB: mundial
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mundial"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mundial:mundial@db:5436/mundial
      ENV: development
      CORS_ORIGINS: "http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
